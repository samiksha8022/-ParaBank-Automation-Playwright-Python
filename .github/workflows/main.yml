name: ParaBank Playwright CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Run ParaBank Tests
    runs-on: ubuntu-latest
    env:
     TOKEN: ${{ secrets.TOKEN }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-playwright playwright pytest-html

      - name: Install Playwright Browsers
        run: playwright install --with-deps chromium

      -  name: Run ParaBank Tests
         run: |
           pytest test_login.py test_register.py test_transaction.py -v --tb=short --html=report.html 2>&1 | tee test-results.txt
         continue-on-error: true

      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: html-report
          path: report.html
          if-no-files-found: ignore

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: test-results
          path: test-results.txt
          if-no-files-found: ignore
